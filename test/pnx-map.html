<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Parcs nationaux – Leaflet</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
.popup-content {
    max-height: 250px;
    overflow-y: auto;
    font-size: 13px;
}
.popup-content b {
    color: #2c3e50;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([46.5, 2.5], 3);

// Fond OpenStreetMap
L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
    attribution: '&copy; IGN'
}).addTo(map);

// URLs GeoJSON
const urlReserves = "https://static.data.gouv.fr/resources/contours-des-11-parcs-nationaux-de-france/20240208-145408/pnx-reserves-integrales.geojson";
const urlCoeurAA = "https://static.data.gouv.fr/resources/contours-des-11-parcs-nationaux-de-france/20250203-104630/pnx-coeur-aa-ama.geojson";

// Génère le contenu HTML de la popup à partir des attributs
function buildPopup(properties) {
    let html = "<div class='popup-content'>";
    for (let key in properties) {
        html += `<b>${key}</b> : ${properties[key]}<br>`;
    }
    html += "</div>";
    return html;
}

// Action au clic sur un objet
function onEachFeature(feature, layer) {
    if (feature.properties) {
        layer.on('click', function () {
            // Zoom sur l'objet
            map.fitBounds(layer.getBounds(), { padding: [20, 20] });

            // Popup avec attributs
            layer.bindPopup(buildPopup(feature.properties)).openPopup();
        });
    }
}

// Styles
const styleReserves = {
    color: "#e74c3c",
    weight: 2,
    fillOpacity: 0.4
};

const styleCoeurAA = {
    color: "#27ae60",
    weight: 2,
    fillOpacity: 0.25
};

// Chargement Réserves intégrales
fetch(urlReserves)
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: styleReserves,
        onEachFeature: onEachFeature
    }).addTo(map);
});

// Chargement Aires d’adhésion + Cœurs
fetch(urlCoeurAA)
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: styleCoeurAA,
        onEachFeature: onEachFeature
    }).addTo(map);
});

// Légende
const legend = L.control({position: 'bottomright'});
legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'info legend');
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.borderRadius = "5px";
    div.innerHTML = `
        <b>Parcs nationaux</b><br>
        <span style="color:#e74c3c;">■</span> Réserves intégrales<br>
        <span style="color:#27ae60;">■</span> Cœurs & Aires d'adhésion
    `;
    return div;
};
legend.addTo(map);

</script>
</body>
</html>
