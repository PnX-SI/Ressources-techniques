<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Parcs nationaux – Leaflet</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body { margin:0; height:100%; }
#map { width:100%; height:100%; }

.popup-content {
    max-height: 250px;
    overflow-y: auto;
    font-size: 13px;
}

.legend {
    background: white;
    padding: 10px;
    border-radius: 6px;
    line-height: 18px;
}
.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.8;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
// ---------------------
// Carte
// ---------------------
const map = L.map('map').setView([46.5, 2.5], 3);

L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
    attribution: '&copy; IGN - Plan V2'
}).addTo(map);

// ---------------------
// URLs GeoJSON
// ---------------------
const urlReserves = "https://static.data.gouv.fr/resources/contours-des-11-parcs-nationaux-de-france/20240208-145408/pnx-reserves-integrales.geojson";
const urlCoeurAA = "https://static.data.gouv.fr/resources/contours-des-11-parcs-nationaux-de-france/20250203-104630/pnx-coeur-aa-ama.geojson";

// ---------------------
// Popup
// ---------------------
function buildPopup(props) {
    let html = "<div class='popup-content'>";
    for (let k in props) {
        html += `<b>${k}</b> : ${props[k]}<br>`;
    }
    html += "</div>";
    return html;
}

function onEachFeature(feature, layer) {
    layer.on("click", function() {
        map.fitBounds(layer.getBounds(), { padding: [20,20] });
        layer.bindPopup(buildPopup(feature.properties)).openPopup();
    });
}

// ---------------------
// Couleurs par type de zone
// ---------------------
function getColor(code) {
    return code === "CTPN"  ? "#0b5d1e" :   // cœur
           code === "AAPN"  ? "#1f8f3a" :   // aire d’adhésion
           code === "CMPN"  ? "#006d5b" :   // cœur marin
           code === "AMAPN" ? "#2bbbad" :   // aire maritime
                             "#9ccc65";
}

// ---------------------
// Styles
// ---------------------
const styleReserves = {
    color: "#c0392b",
    weight: 2,
    fillOpacity: 0.4
};

function styleCoeurAA(feature) {
    return {
        color: "#145a32",
        weight: 1.5,
        fillOpacity: 0.6,
        fillColor: getColor(feature.properties.code_r_enp)
    };
}

// ---------------------
// Chargement Réserves
// ---------------------
fetch(urlReserves)
.then(r => r.json())
.then(data => {
    L.geoJSON(data, {
        style: styleReserves,
        onEachFeature: onEachFeature
    }).addTo(map);
});

// ---------------------
// Chargement Cœurs + AA
// ---------------------
fetch(urlCoeurAA)
.then(r => r.json())
.then(data => {
    L.geoJSON(data, {
        style: styleCoeurAA,
        onEachFeature: onEachFeature
    }).addTo(map);
});

// ---------------------
// Légende
// ---------------------
const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML = "<b>Types de zones</b><br>";

    div.innerHTML += '<i style="background:#c0392b"></i> Réserves intégrales<br>';

    const types = [
        ["CTPN", "Cœur de parc national"],
        ["AAPN", "Aire d’adhésion"],
        ["CMPN", "Cœur marin"],
        ["AMAPN", "Aire maritime adjacente"]
    ];

    types.forEach(t => {
        div.innerHTML +=
            '<i style="background:' + getColor(t[0]) + '"></i> ' +
            t[1] + '<br>';
    });

    return div;
};
legend.addTo(map);

</script>
</body>
</html>
